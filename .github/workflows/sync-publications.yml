name: Sync publications from ORCID

on:
  schedule:
    # Runs at 06:00 UTC on the 1st of every month
    - cron: "0 6 1 * *"
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated JSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch publications from ORCID
        run: python scripts/fetch_orcid_publications.py

      - name: Commit updated publications (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/publications.json
          # Only commit when the file actually changed
          git diff --cached --quiet || git commit -m "chore: sync publications from ORCID [skip ci]"
          git push
